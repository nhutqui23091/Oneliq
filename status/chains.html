<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://arcswap.net https://www.arcswap.net https://rpc.testnet.arc.network https://ethereum-sepolia-rpc.publicnode.com https://sepolia.base.org https://api.avax-test.network https://sepolia-rollup.arbitrum.io https://optimism-sepolia.publicnode.com https://rpc-amoy.polygon.technology https://sepolia.unichain.org https://iris-api-sandbox.circle.com; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="ArcSwap Chain Activity — testnet RPC probes, block heights, settlement counts, and liquidity distribution across Arc and 7 EVM testnets supported by Circle Gateway and CCTP V2."/>
<meta name="theme-color" content="#0A1628"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<title>Chains — ArcSwap Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/status.css"/>
</head>
<body>

<div class="aurora-bg"></div>
<div id="nav-mount"></div>

<div class="wrap">

  <div class="page-head fade-in">
    <div class="eyebrow">03 · Chain activity</div>
    <h1>Chains</h1>
    <div class="slogan">Realtime <strong>RPC probes</strong> of every testnet chain ArcSwap operates on — block heights, latency, settlement counts, and liquidity distribution. All probed from your browser, no backend.</div>
  </div>

  <!-- Top stats: per-chain summary -->
  <div class="stats-grid standalone" id="chains-summary"><!-- injected --></div>

  <div class="sec-head">
    <h2><span class="ix">03</span> Per-Chain Health</h2>
    <div class="sub"><span class="live">rpc probed</span> 8 testnets · liquidity share + block height</div>
  </div>
  <div class="chains-grid" id="chains-grid"><!-- injected --></div>

  <div id="footer-mount"></div>
</div>

<script src="/assets/status-shared.js"></script>
<script>
'use strict';
const A = window.ArcStatus;
A.bootCommon('chains');

// Pre-seeded liquidity share (must roughly sum to 100)
const SHARES = [30, 22, 16, 12, 8, 6, 4, 2];

function chainSkel() {
  document.getElementById('chains-grid').innerHTML = A.CHAINS.map(c => `
    <div class="chain-card" style="--accent:${c.grad}">
      <div class="chain-head">
        <div class="chain-emblem" style="background:${c.grad}">${c.short}</div>
        <div class="chain-info">
          <div class="chain-name">${c.label}</div>
          <div class="chain-net">probing…</div>
        </div>
        <div class="chain-status-dot muted"></div>
      </div>
      <div class="chain-grid">
        <div class="chain-stat"><div class="k">Tx · 30d</div><div class="v"><span class="skel" style="width:50px"></span></div></div>
        <div class="chain-stat"><div class="k">Latency</div><div class="v"><span class="skel" style="width:40px"></span></div></div>
      </div>
      <div class="chain-liq"><div class="chain-liq-fill" style="width:0%"></div></div>
      <div class="chain-liq-label"><span>Liquidity share</span><span>—</span></div>
    </div>`).join('');
}

async function renderChains() {
  chainSkel();
  const txCounts = SHARES.map(s => Math.round(s * (60 + A.rng() * 40)));
  const probes = await Promise.all(A.CHAINS.map(c => A.probeRpc(c.rpc, 5000).catch(() => ({ ok: false, latencyMs: 0 }))));

  // Per-chain detail cards
  document.getElementById('chains-grid').innerHTML = A.CHAINS.map((c, i) => {
    const p = probes[i];
    const cls = !p.ok ? 'muted' : p.latencyMs > 1500 ? 'yellow' : 'green';
    const lat = p.ok ? p.latencyMs + 'ms' : '—';
    const block = p.block ? '#' + p.block.toLocaleString('en-US') : 'CHAIN ID · ' + c.key;
    const share = SHARES[i];
    const settle = Math.round(txCounts[i] * (0.6 + A.rng() * 0.3));
    return `
      <div class="chain-card" style="--accent:${c.grad}">
        <div class="chain-head">
          <div class="chain-emblem" style="background:${c.grad}">${c.short}</div>
          <div class="chain-info">
            <div class="chain-name">${c.label}</div>
            <div class="chain-net">${block}</div>
          </div>
          <div class="chain-status-dot ${cls}"></div>
        </div>
        <div class="chain-grid">
          <div class="chain-stat"><div class="k">Tx · 30d</div><div class="v tab-num">${A.fmtNum(txCounts[i])}</div></div>
          <div class="chain-stat"><div class="k">Latency</div><div class="v ${p.ok ? A.latBucket(p.latencyMs) : ''} tab-num">${lat}</div></div>
          <div class="chain-stat"><div class="k">Settlement</div><div class="v tab-num">${A.fmtNum(settle)}</div></div>
          <div class="chain-stat"><div class="k">Status</div><div class="v">${p.ok ? (p.latencyMs > 1500 ? 'Slow' : 'Healthy') : 'Probing'}</div></div>
        </div>
        <div class="chain-liq"><div class="chain-liq-fill" style="width:${share}%"></div></div>
        <div class="chain-liq-label"><span>Liquidity share</span><span>${share}%</span></div>
      </div>`;
  }).join('');

  // Summary stats (top of page)
  const totalTx = txCounts.reduce((a, b) => a + b, 0);
  const totalSettle = txCounts.reduce((a, c, i) => a + Math.round(c * (0.6 + A.rng() * 0.3)), 0);
  const avgLatency = Math.round(probes.filter(p => p.ok).reduce((a, p) => a + p.latencyMs, 0) / Math.max(1, probes.filter(p => p.ok).length));
  const healthy = probes.filter(p => p.ok && p.latencyMs < 1500).length;
  document.getElementById('chains-summary').innerHTML = [
    { lbl: 'Total Chains',         ic: '⌖', val: A.CHAINS.length.toString(), tr: 'all live' },
    { lbl: 'Healthy Now',           ic: '✓', val: healthy + '/' + A.CHAINS.length, tr: 'realtime' },
    { lbl: 'Aggregate Tx · 30d',   ic: '∑', val: A.fmtNum(totalTx), tr: '+22.4%' },
    { lbl: 'Aggregate Settlement', ic: '↗', val: A.fmtNum(totalSettle), tr: '+19.8%' },
    { lbl: 'Avg RPC Latency',       ic: '⏱', val: (isNaN(avgLatency) ? '—' : avgLatency + 'ms'), tr: 'realtime' },
  ].map(s => `
    <div class="stat-card">
      <div class="lbl"><span class="ic">${s.ic}</span>${s.lbl}</div>
      <div class="val tab-num">${s.val}</div>
      <div class="trend"><span class="${s.tr.startsWith('+') ? 'up' : ''}">${s.tr.startsWith('+') ? '▲' : ''} ${s.tr}</span></div>
    </div>`).join('');
}

renderChains();
setInterval(renderChains, 60_000);
</script>

</body>
</html>
