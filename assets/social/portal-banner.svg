<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Oneliq Portal is now live — your daily on-ramp to Arc Testnet">
  <defs>
    <linearGradient id="pb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1A30"/>
      <stop offset="0.55" stop-color="#0E1F39"/>
      <stop offset="1" stop-color="#091426"/>
    </linearGradient>
    <linearGradient id="pb-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2BD6E6"/>
      <stop offset="0.5" stop-color="#2E84F0"/>
      <stop offset="1" stop-color="#6A45F0"/>
    </linearGradient>
    <radialGradient id="pb-aurora" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#2BD6E6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2BD6E6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pb-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2E84F0" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2E84F0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#pb-bg)"/>
  <rect width="1200" height="600" fill="url(#pb-aurora)"/>
  <rect x="1" y="1" width="1198" height="598" rx="0" fill="none" stroke="#2E84F0" stroke-opacity="0.12" stroke-width="2"/>

  <!-- faint decorative orbit on the right -->
  <circle cx="990" cy="300" r="250" fill="none" stroke="#2E84F0" stroke-opacity="0.07" stroke-width="2"/>
  <circle cx="990" cy="300" r="170" fill="none" stroke="#2BD6E6" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Oneliq mark -->
  <circle cx="220" cy="300" r="118" fill="url(#pb-glow)"/>
  <path d="M264.7,236.1 A78,78 0 1 0 261.3,366.1" fill="none" stroke="url(#pb-grad)" stroke-width="30" stroke-linecap="round"/>
  <circle cx="295" cy="251" r="18" fill="url(#pb-grad)"/>

  <!-- Text block -->
  <text x="392" y="214" font-family="'Consolas','SF Mono',ui-monospace,monospace" font-size="20" letter-spacing="6" fill="#7FE9F0" font-weight="700">ONELIQ · ARC TESTNET</text>

  <text x="390" y="306" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="82" font-weight="800" letter-spacing="-1">
    <tspan fill="#F5F7FB">Oneliq </tspan><tspan fill="url(#pb-grad)">Portal</tspan>
  </text>

  <text x="392" y="356" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="30" fill="#AEC0D6" font-weight="500">Your daily on-ramp to Arc Testnet.</text>

  <!-- Feature chips -->
  <g font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="20" font-weight="600">
    <g>
      <rect x="392" y="404" width="196" height="46" rx="23" fill="#ffffff" fill-opacity="0.05" stroke="#2BD6E6" stroke-opacity="0.28"/>
      <text x="490" y="434" text-anchor="middle" fill="#DCE6F2">Daily check-ins</text>
    </g>
    <g>
      <rect x="602" y="404" width="126" height="46" rx="23" fill="#ffffff" fill-opacity="0.05" stroke="#2BD6E6" stroke-opacity="0.28"/>
      <text x="665" y="434" text-anchor="middle" fill="#DCE6F2">Streaks</text>
    </g>
    <g>
      <rect x="742" y="404" width="124" height="46" rx="23" fill="#ffffff" fill-opacity="0.05" stroke="#2BD6E6" stroke-opacity="0.28"/>
      <text x="804" y="434" text-anchor="middle" fill="#DCE6F2">Badges</text>
    </g>
    <g>
      <rect x="880" y="404" width="142" height="46" rx="23" fill="#ffffff" fill-opacity="0.05" stroke="#2BD6E6" stroke-opacity="0.28"/>
      <text x="951" y="434" text-anchor="middle" fill="#DCE6F2">Referrals</text>
    </g>
  </g>
</svg>
