<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset=".55" stop-color="#0E1F39"/>
      <stop offset="1" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4DD6DB"/>
      <stop offset=".5" stop-color="#4A7BEC"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4DD6DB"/>
      <stop offset="1" stop-color="#4A7BEC"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#FFD080"/>
      <stop offset=".55" stop-color="#FF7A2F"/>
      <stop offset="1" stop-color="#FF4500"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4DD6DB" stop-opacity="0"/>
      <stop offset=".5" stop-color="#4DD6DB" stop-opacity=".9"/>
      <stop offset="1" stop-color="#4A7BEC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#4DD6DB" stop-opacity=".30"/>
      <stop offset="1" stop-color="#4DD6DB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb1" cx=".18" cy=".22" r=".55">
      <stop offset="0" stop-color="#4A7BEC" stop-opacity=".22"/>
      <stop offset="1" stop-color="#4A7BEC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx=".82" cy=".26" r=".5">
      <stop offset="0" stop-color="#4DD6DB" stop-opacity=".20"/>
      <stop offset="1" stop-color="#4DD6DB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <rect width="1200" height="600" fill="url(#orb1)"/>
  <rect width="1200" height="600" fill="url(#orb2)"/>

  <!-- TESTNET CAMPAIGN pill -->
  <g transform="translate(80 96)">
    <rect width="232" height="48" rx="24" fill="rgba(77,214,219,0.12)" stroke="rgba(77,214,219,0.50)"/>
    <circle cx="28" cy="24" r="6" fill="#4DD6DB">
      <animate attributeName="opacity" values="1;.35;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="48" y="30" font-family="DM Mono, monospace" font-size="14" font-weight="700" fill="#4DD6DB" letter-spacing="2">TESTNET CAMPAIGN</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80 200)">
    <text x="0" y="0" font-family="DM Mono, monospace" font-size="14" font-weight="600" fill="#4DD6DB" letter-spacing="3">// COMMUNITY CAMPAIGN</text>
    <text x="0" y="92" font-family="Inter, sans-serif" font-size="92" font-weight="900" fill="url(#brand)" letter-spacing="-3">Daily GM.</text>
    <text x="0" y="156" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#8CA0BD">One tap a day. One real transaction on Arc.</text>
    <text x="0" y="188" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#8CA0BD">Build the streak. Learn the network.</text>
  </g>

  <!-- Right: sunrise + streak motif - concentric halo (echo of the GM page logo
       ring) with a flame at the center, rising over a glowing horizon. -->
  <g transform="translate(940 300)">
    <!-- soft glow behind -->
    <circle r="220" fill="url(#sunGlow)"/>
    <!-- concentric rings -->
    <circle r="190" fill="none" stroke="#4A7BEC" stroke-width="1" opacity=".22"/>
    <circle r="150" fill="none" stroke="#4DD6DB" stroke-width="1" opacity=".32"/>
    <circle r="112" fill="none" stroke="#4DD6DB" stroke-width="1.5" opacity=".42"/>
    <!-- center disk -->
    <circle r="82" fill="rgba(10,22,40,0.88)" stroke="url(#ring)" stroke-width="2.5"/>
    <!-- streak flame glyph (centered in disk) -->
    <g transform="translate(-32 -44) scale(1.62)">
      <path d="M20,52 C12,47 5,37 8,24 C9,17 14,13 12,4 C16,12 18,10 17,3 L20,0 L23,3 C22,10 24,12 28,4 C26,13 31,17 32,24 C35,37 28,47 20,52Z" fill="url(#flame)">
        <animate attributeName="opacity" values="1;.82;1" dur="1.8s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- orbit satellite (day marker) -->
    <g>
      <circle cx="150" cy="0" r="9" fill="#4DD6DB"/>
      <circle cx="150" cy="0" r="9" fill="none" stroke="#4DD6DB" stroke-width="1" opacity=".4">
        <animate attributeName="r" values="9;18;9" dur="2.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".5;0;.5" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="rotate(130)">
      <circle cx="190" cy="0" r="7" fill="#4A7BEC"/>
      <circle cx="190" cy="0" r="7" fill="none" stroke="#4A7BEC" stroke-width="1" opacity=".4">
        <animate attributeName="r" values="7;14;7" dur="3.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".5;0;.5" dur="3.0s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Sunrise horizon line sweeping across the banner -->
  <path d="M 0 470 Q 600 388 1200 470" fill="none" stroke="url(#horizon)" stroke-width="2.5"/>

  <!-- Brand bottom -->
  <g transform="translate(80 540)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#F5F7FB" letter-spacing="-.5">Oneliq</text>
    <text x="100" y="0" font-family="DM Mono, monospace" font-size="13" fill="#8CA0BD" letter-spacing="2">// oneliq.xyz/gm  ·  Jun 16, 2026</text>
  </g>
</svg>
